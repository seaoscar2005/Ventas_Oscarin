<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos de Entrega - MENU 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="body-entrega">

<div class="contenedor-principal-web">
    <header class="navbar-principal">
        <div class="navbar-contenedor">
            <div class="navbar-izquierda">
                <a href="/carrito" class="btn-regresar-icono"><i class="fas fa-arrow-left"></i></a>
            </div>
            <div class="navbar-centro">
                <h1 class="titulo-menu">FINALIZAR PEDIDO</h1>
            </div>
            <div class="navbar-derecha"><div style="width: 30px;"></div></div>
        </div>
    </header>

    <main class="contenido-entrega">
        <div class="card-formulario">
            <h3><i class="fas fa-shipping-fast"></i> Datos de Envío</h3>
            
            <div class="input-group">
                <label>Nombre Completo</label>
                <div class="input-container">
                    <i class="fas fa-user"></i>
                    <input type="text" id="nombre-cliente" placeholder="Nombre y Apellidos">
                </div>
            </div>

            <div class="input-group">
                <label>Correo Electrónico</label>
                <div class="input-container">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="correo-cliente" placeholder="ejemplo@correo.com">
                </div>
            </div>

            <div class="input-group">
                <label>Número de Teléfono</label>
                <div class="input-container">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="telefono-cliente" placeholder="10 dígitos">
                </div>
            </div>

            <div class="input-group">
                <label>Ubicación (Referencia o Salón)</label>
                <div class="input-container">
                    <i class="fas fa-building"></i>
                    <input type="text" id="ubicacion-referencia" placeholder="Ej. Edificio A, Salón 5">
                </div>
            </div>

            <div class="input-group">
                <label>Punto de Entrega Exacto</label>
                <button type="button" class="btn-mapa-pro" onclick="abrirMapa()">
                    <i class="fas fa-map-marked-alt"></i> Seleccionar ubicación en el mapa
                </button>
                <div id="indicador-ubicacion" class="status-ok" style="display: none;">
                    <i class="fas fa-check-circle"></i> Ubicación capturada correctamente
                </div>
                <input type="hidden" id="gps-datos"> 
            </div>

            <div class="input-group">
                <label>Medio de Pago</label>
                <div class="input-container">
                    <i class="fas fa-credit-card"></i>
                    <select id="metodo-pago" class="select-pro">
                        <option value="efectivo">Efectivo</option>
                        <option value="tarjeta">Tarjeta (Pago al recibir)</option>
                    </select>
                </div>
            </div>

            <div id="seccion-paga-con" class="input-group">
                <label>¿Con cuánto pagas?</label>
                <div class="input-container">
                    <i class="fas fa-money-bill-wave"></i>
                    <input type="number" id="paga-con" placeholder="Monto para tu cambio">
                </div>
            </div>

            <button class="btn-finalizar-pedido" onclick="enviarPedidoFinal()">
                CONFIRMAR PEDIDO <i class="fas fa-check-double"></i>
            </button>
        </div>
    </main>
</div>

<div id="modal-mapa" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h4>Mueve el pin a tu ubicación</h4>
            <span class="close" onclick="cerrarMapa()">&times;</span>
        </div>
        <div id="map" style="height: 400px; width: 100%; border-radius: 15px;"></div>
        <button type="button" class="btn-confirmar-mapa" onclick="confirmarUbicacion()">
            CONFIRMAR ESTE PUNTO
        </button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/carrito_logic.js') }}"></script>
<script src="{{ url_for('static', filename='js/entrega_logic.js') }}"></script>

<script>
    // Lógica para mostrar/ocultar el campo de efectivo
    const selectPago = document.getElementById('metodo-pago');
    const seccionEfectivo = document.getElementById('seccion-paga-con');

    selectPago.addEventListener('change', function() {
        if (this.value === 'tarjeta') {
            seccionEfectivo.style.display = 'none';
        } else {
            seccionEfectivo.style.display = 'block';
        }
    });
</script>

</body>
</html>
